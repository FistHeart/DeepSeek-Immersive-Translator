<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>DeepSeek 沉浸式翻译</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">

  <!-- ── Header ─────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">&#x1f310;</span>
      <h1>DeepSeek 沉浸式翻译</h1>
    </div>
    <p class="subtitle">AI 多模式阅读助手</p>
  </header>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  STEP 1 — API Key                             -->
  <!-- ═══════════════════════════════════════════════ -->
  <section class="step" id="step1">
    <div class="step-head">
      <span class="step-num">Step 1</span>
      <span class="step-title">DeepSeek API Key</span>
      <span class="step-badge" id="step1Badge">必需</span>
    </div>
    <div class="step-body">
      <div class="input-row">
        <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" spellcheck="false">
        <span class="status-dot" id="keyStatus" title="未验证"></span>
      </div>
      <div class="btn-row">
        <button id="saveKeyBtn" class="btn btn-primary">保存并验证</button>
        <button id="clearKeyBtn" class="btn btn-ghost">清除</button>
      </div>
      <p class="hint">密钥仅存储在本地浏览器。<a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noopener">获取 Key →</a></p>
      <div class="feedback" id="keyFeedback" style="display:none"></div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  STEP 2 — Target Language                     -->
  <!-- ═══════════════════════════════════════════════ -->
  <section class="step step--locked" id="step2">
    <div class="step-head">
      <span class="step-num">Step 2</span>
      <span class="step-title">选择目标语言</span>
      <span class="step-badge" id="step2Badge">待解锁</span>
    </div>
    <div class="step-body">
      <select id="targetLang" class="select" disabled>
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
      </select>
      <p class="hint">选择翻译输出的目标语言，共 6 种精选语言</p>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  STEP 3 — Translation Modes                   -->
  <!-- ═══════════════════════════════════════════════ -->
  <section class="step step--locked" id="step3">
    <div class="step-head">
      <span class="step-num">Step 3</span>
      <span class="step-title">启用翻译功能</span>
      <span class="step-badge" id="step3Badge">待解锁</span>
    </div>
    <div class="step-body">
      <div class="mode-list">
        <!-- Hover -->
        <div class="mode-row" id="modeHover">
          <div class="mode-info">
            <span class="mode-name">滑动翻译</span>
            <span class="mode-desc">鼠标悬停段落时弹出翻译</span>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggleHover" disabled>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <!-- Article -->
        <div class="mode-row" id="modeArticle">
          <div class="mode-info">
            <span class="mode-name">正文翻译</span>
            <span class="mode-desc">自动检测段落并翻译，红色→绿色</span>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggleArticle" disabled>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <!-- Phrase -->
        <div class="mode-row" id="modePhrase">
          <div class="mode-info">
            <span class="mode-name">短语翻译</span>
            <span class="mode-desc">检测 2-10 词英文短语，黄色方块</span>
          </div>
          <label class="toggle">
            <input type="checkbox" id="togglePhrase" disabled>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <!-- Selection -->
        <div class="mode-row" id="modeSelection">
          <div class="mode-info">
            <span class="mode-name">滑词翻译</span>
            <span class="mode-desc">选中文字后弹出翻译</span>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggleSelection" disabled>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <button id="clearCacheBtn" class="btn btn-outline btn-sm" style="margin-top:12px;width:100%">清除翻译缓存</button>
    </div>
  </section>

  <!-- ── Footer ─────────────────────────────────── -->
  <footer class="footer">
    <span>DeepSeek V4 Flash</span>
    <span class="version">v7.0.1</span>
  </footer>
</div>

<script src="lib/storage.js"></script>
<script src="popup.js"></script>
</body>
</html>
